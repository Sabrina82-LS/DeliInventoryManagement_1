name: Run Selenium Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Selenium IDE Tests
      uses: Dylan700/selenium-ide-action@latest
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
